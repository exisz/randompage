name: Publish to apps-repo

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_code:
        description: "versionCode (integer)"
        required: true
      version_name:
        description: "versionName (e.g. 1.0.0)"
        required: true
      apk_url:
        description: "APK URL. Required for manual dispatch; release events poll the release assets."
        required: true
      changelog:
        description: "Changelog"
        required: false
        default: ""

jobs:
  get-build-info:
    runs-on: [self-hosted, linux, x64, randompage]
    permissions:
      contents: read
    outputs:
      version_code: ${{ steps.info.outputs.version_code }}
      version_name: ${{ steps.info.outputs.version_name }}
      changelog: ${{ steps.info.outputs.changelog }}
      apk_url: ${{ steps.info.outputs.apk_url }}
    steps:
      - name: Determine version info
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION_NAME="${TAG#v}"
            echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
            echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "changelog=${{ github.event.release.body }}" >> "$GITHUB_OUTPUT"
            APK_URL=""
            for attempt in {1..24}; do
              APK_URL=$(gh release view "$TAG" \
                --repo "${{ github.repository }}" \
                --json assets \
                --jq '.assets[] | select(.name | endswith(".apk")) | .url' \
                | head -1)
              if [ -n "$APK_URL" ]; then
                break
              fi
              echo "No APK asset on $TAG yet (attempt $attempt/24); waiting..."
              sleep 10
            done
            if [ -z "$APK_URL" ]; then
              echo "No APK asset found on release $TAG after waiting." >&2
              exit 1
            fi
            echo "apk_url=${APK_URL}" >> "$GITHUB_OUTPUT"
          else
            echo "version_code=${{ inputs.version_code }}" >> "$GITHUB_OUTPUT"
            echo "version_name=${{ inputs.version_name }}" >> "$GITHUB_OUTPUT"
            echo "changelog=${{ inputs.changelog }}" >> "$GITHUB_OUTPUT"
            echo "apk_url=${{ inputs.apk_url }}" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: get-build-info
    runs-on: [self-hosted, linux, x64, randompage]
    permissions:
      contents: read
    steps:
      - name: Checkout apps-repo
        uses: actions/checkout@v4
        with:
          repository: exisz/apps-repo
          token: ${{ secrets.APPS_REPO_PAT }}
          ref: main

      - name: Download APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APK_URL: ${{ needs.get-build-info.outputs.apk_url }}
        run: |
          APK_FILENAME="randompage_${{ needs.get-build-info.outputs.version_code }}.apk"
          mkdir -p apps/randompage

          # RandomPage is a private repo, so unauthenticated curl can save a tiny
          # GitHub error body instead of the APK. Use authenticated gh for GitHub
          # release assets and verify size so the store never gets placeholders.
          if [[ "$APK_URL" == https://github.com/${{ github.repository }}/releases/download/* ]]; then
            TAG=$(python3 - <<'PY_TAG'
          import os
          parts = os.environ['APK_URL'].split('/releases/download/', 1)[1].split('/', 1)
          print(parts[0])
          PY_TAG
          )
            ASSET_NAME=$(basename "$APK_URL")
            gh release download "$TAG" \
              --repo "${{ github.repository }}" \
              --pattern "$ASSET_NAME" \
              --output "apps/randompage/${APK_FILENAME}"
          else
            curl -fL "$APK_URL" -o "apps/randompage/${APK_FILENAME}"
          fi

          test "$(stat -c%s "apps/randompage/${APK_FILENAME}")" -gt 100000
          echo "APK_FILENAME=${APK_FILENAME}" >> "$GITHUB_ENV"

      - name: Compute SHA256
        run: |
          SHA=$(sha256sum "apps/randompage/${{ env.APK_FILENAME }}" | cut -d' ' -f1)
          SIZE=$(stat -c%s "apps/randompage/${{ env.APK_FILENAME }}")
          echo "APK_SHA256=${SHA}" >> "$GITHUB_ENV"
          echo "APK_SIZE=${SIZE}" >> "$GITHUB_ENV"

      - name: Update metadata.json
        run: |
          python3 - <<'EOF'
          import json, os
          from datetime import datetime, timezone

          meta_path = "apps/randompage/metadata.json"
          with open(meta_path) as f:
              meta = json.load(f)

          new_version = {
              "versionCode": int("${{ needs.get-build-info.outputs.version_code }}"),
              "versionName": "${{ needs.get-build-info.outputs.version_name }}",
              "apk": f"apps/randompage/${{ env.APK_FILENAME }}",
              "size": int(os.environ["APK_SIZE"]),
              "released_at": datetime.now(timezone.utc).isoformat(),
              "sha256": os.environ["APK_SHA256"],
              "changelog": "${{ needs.get-build-info.outputs.changelog }}"
          }

          meta["versions"] = [
              v for v in meta.get("versions", [])
              if v["versionCode"] != new_version["versionCode"]
          ]
          meta["versions"].insert(0, new_version)
          meta["versions"].sort(key=lambda v: v["versionCode"], reverse=True)

          with open(meta_path, "w") as f:
              json.dump(meta, f, indent=2, ensure_ascii=False)
          print(f"Updated metadata for au.com.rollersoft.randompage v${{ needs.get-build-info.outputs.version_name }}")
          EOF
        env:
          APK_SIZE: ${{ env.APK_SIZE }}
          APK_SHA256: ${{ env.APK_SHA256 }}

      - name: Rebuild index.json
        run: python3 scripts/rebuild-index.py

      - name: Commit and push
        run: |
          git config user.name "apps-bot"
          git config user.email "apps-bot@rollersoft.com.au"
          git add apps/ index.json
          if git diff --cached --quiet; then
            echo "No apps-repo changes to publish."
            exit 0
          fi
          git commit -m "publish(randompage): v${{ needs.get-build-info.outputs.version_name }} (versionCode ${{ needs.get-build-info.outputs.version_code }})"
          git push origin main

      - name: Trigger apps-store rebuild
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.STORE_REBUILD_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/exisz/apps-store/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'
