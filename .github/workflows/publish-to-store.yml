name: Publish to apps-repo

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_code:
        description: "versionCode (integer)"
        required: true
      version_name:
        description: "versionName (e.g. 1.0.0)"
        required: true
      apk_url:
        description: "APK URL. Required for manual dispatch; release events poll release assets."
        required: true
      changelog:
        description: "Changelog"
        required: false
        default: ""

jobs:
  get-build-info:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version_code: ${{ steps.info.outputs.version_code }}
      version_name: ${{ steps.info.outputs.version_name }}
      changelog: ${{ steps.info.outputs.changelog }}
      apk_url: ${{ steps.info.outputs.apk_url }}
    steps:
      - name: Determine version info
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION_NAME="${TAG#v}"
            echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
            echo "version_code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "changelog=${{ github.event.release.body }}" >> "$GITHUB_OUTPUT"
            APK_URL=""
            for attempt in {1..24}; do
              APK_URL=$(gh release view "$TAG" \
                --repo "${{ github.repository }}" \
                --json assets \
                --jq '.assets[] | select(.name | endswith(".apk")) | .url' \
                | head -1)
              if [ -n "$APK_URL" ]; then
                break
              fi
              echo "No APK asset on $TAG yet (attempt $attempt/24); waiting..."
              sleep 10
            done
            if [ -z "$APK_URL" ]; then
              echo "No APK asset found on release $TAG after waiting." >&2
              exit 1
            fi
            echo "apk_url=${APK_URL}" >> "$GITHUB_OUTPUT"
          else
            echo "version_code=${{ inputs.version_code }}" >> "$GITHUB_OUTPUT"
            echo "version_name=${{ inputs.version_name }}" >> "$GITHUB_OUTPUT"
            echo "changelog=${{ inputs.changelog }}" >> "$GITHUB_OUTPUT"
            echo "apk_url=${{ inputs.apk_url }}" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: get-build-info
    uses: exisz/apps-repo/.github/workflows/publish.yml@main
    with:
      app_id: au.com.rollersoft.randompage
      app_dir: randompage
      apk_url: ${{ needs.get-build-info.outputs.apk_url }}
      version_code: ${{ needs.get-build-info.outputs.version_code }}
      version_name: ${{ needs.get-build-info.outputs.version_name }}
      changelog: ${{ needs.get-build-info.outputs.changelog }}
    secrets:
      APPS_REPO_PAT: ${{ secrets.APPS_REPO_PAT }}
